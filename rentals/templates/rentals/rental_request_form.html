{% extends 'base.html' %}
{% block title %}Запрос на аренду{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Запрос на аренду: {{ ad.title }}</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small">
          {{ field.errors }}
        </div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Отправить</button>
      <a href="{% url 'ad_detail' ad.id %}" class="btn btn-secondary">Назад</a>
    </form>
  </div>
</div>
{% endblock %}
